<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magiske Timer 2026 | Nedtelling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0f1d;
            --light: #f8fafc;
        }
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Bakgrunnseffekt */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, rgba(10, 15, 29, 1) 70%);
            z-index: -1;
        }

        .main-container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 40px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* TIMER FOKUS */
        .timer {
            display: flex;
            gap: clamp(10px, 4vw, 40px);
            justify-content: center;
            align-items: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            min-width: clamp(80px, 15vw, 180px);
        }

        .time-box span:first-child {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: var(--light);
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .time-box span:last-child {
            font-size: clamp(0.7rem, 2vw, 1.2rem);
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 10px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .dots {
            font-size: clamp(2rem, 10vw, 5rem);
            color: var(--gold);
            padding-bottom: 40px;
            opacity: 0.5;
        }

        #message {
            margin-top: 40px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="main-container">
    <h1>Magiske Timer 2026</h1>
    
    <div class="timer">
        <div class="time-box"><span id="days">00</span><span>Dager</span></div>
        <div class="dots">:</div>
        <div class="time-box"><span id="hours">00</span><span>Timer</span></div>
        <div class="dots">:</div>
        <div class="time-box"><span id="minutes">00</span><span>Min</span></div>
        <div class="dots">:</div>
        <div class="time-box"><span id="seconds">00</span><span>Sek</span></div>
    </div>

    <div id="message">BERGEN • SEPTEMBER</div>
</div>

<script>
    const countDownDate = new Date("Mar 5, 2026 12:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
        document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

        if (distance < 0) {
            clearInterval(x);
            document.querySelector(".main-container").innerHTML = "<h1 style='font-size: 5rem;'>MAGIEN STARTER NÅ!</h1>";
        }
    }, 1000);
</script>

</body>
</html>
